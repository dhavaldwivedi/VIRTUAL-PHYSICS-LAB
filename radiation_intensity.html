<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inverse Square Law & Radiation</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 15px;
      /* Removed touch-action: none to allow page scrolling */
    }

    .container {
      width: 100%;
      max-width: 1300px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 950px) {
      .container {
        grid-template-columns: 1.4fr 1fr;
        align-items: start;
      }
    }

    .panel {
      background: #1e293b;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .title {
      margin: 0 0 15px;
      font-size: 1.3rem;
      font-weight: 700;
      color: #f8fafc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .canvas-wrap {
      width: 100%;
      background: #020617;
      border-radius: 12px;
      border: 1px solid #334155;
      overflow: hidden;
      position: relative;
      /* touch-action: pan-y allows scrolling the page even if touching the canvas */
      touch-action: pan-y; 
    }
    
    #simCanvas {
      display: block;
      width: 100%;
      height: 380px; /* Slightly taller for the top labels */
      cursor: pointer;
    }

    #graphCanvas {
      display: block;
      width: 100%;
      height: 200px;
      background: #020617;
      border-radius: 12px;
      border: 1px solid #334155;
      margin-bottom: 20px;
    }

    .controls-grid {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 20px;
    }

    .control-group {
      background: #0f172a;
      padding: 12px 15px;
      border-radius: 10px;
      border: 1px solid #334155;
    }

    .control-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    input[type="range"] {
      width: 100%;
      min-height: 40px;
      cursor: pointer;
    }

    .math-panel {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 15px;
    }

    .equation {
      font-family: "Courier New", Courier, monospace;
      font-size: 1.1rem;
      font-weight: bold;
      line-height: 1.5;
      color: #e2e8f0;
    }

    .highlight { color: #fbbf24; }
    .success { color: #38bdf8; }
    .subtext { color: #94a3b8; font-size: 0.9rem; }

  </style>
</head>
<body>

  <div class="container">
    
    <section class="panel">
      <div class="title">
        <span>Radiation System</span>
        <span style="font-size: 0.8rem; color: #94a3b8; font-weight: normal;">Drag the Planet</span>
      </div>
      
      <div class="canvas-wrap">
        <canvas id="simCanvas"></canvas>
      </div>

      <div class="math-panel" style="margin-top: 15px; border-left: 4px solid #38bdf8;">
        <div class="equation" id="eqTelemetry" style="font-size: 0.95rem;">
          </div>
      </div>
    </section>

    <section class="panel">
      <div class="title">Intensity vs Distance</div>
      <canvas id="graphCanvas"></canvas>

      <div class="controls-grid">
        <div class="control-group" style="border-top: 3px solid #fbbf24;">
          <label>
            <span>Source Power (P)</span>
            <span id="pVal" style="color:#fbbf24;">3.90 &times; 10&sup2;&sup6; W</span>
          </label>
          <input type="range" id="pSlider" min="0.5" max="10.0" step="0.1" value="3.9">
        </div>

        <div class="control-group" style="border-top: 3px solid #38bdf8;">
          <label>
            <span>Distance (x)</span>
            <span id="xVal" style="color:#38bdf8;">1.00 AU</span>
          </label>
          <input type="range" id="xSlider" min="0.2" max="3.0" step="0.01" value="1.00">
        </div>
      </div>

      <div class="math-panel">
        <div class="equation" style="font-size: 0.85rem;">
          <span class="subtext">I = P / (4&pi;x&sup2;)</span><br>
          I = <span class="highlight" id="iResult"></span> W/m&sup2;
        </div>
      </div>
    </section>

  </div>

  <script>
    const AU_IN_METERS = 1.496e11;
    const P_MULTIPLIER = 1e26;

    const state = {
      P_slider: 3.9,
      x_au: 1.0,
      dragging: false,
      phase: 0,
      currentIntensity: 1380
    };

    const els = {
      pSlider: document.getElementById('pSlider'),
      xSlider: document.getElementById('xSlider'),
      pVal: document.getElementById('pVal'),
      xVal: document.getElementById('xVal'),
      iResult: document.getElementById('iResult'),
      eqTelemetry: document.getElementById('eqTelemetry')
    };

    const simCanvas = document.getElementById('simCanvas');
    const simCtx = simCanvas.getContext('2d');
    const graphCanvas = document.getElementById('graphCanvas');
    const graphCtx = graphCanvas.getContext('2d');

    let simW, simH, graphW, graphH;
    let auToPx = 0;
    let originX = 50;

    function resize() {
      const rectS = simCanvas.parentElement.getBoundingClientRect();
      simW = rectS.width;
      simH = 380;
      simCanvas.width = simW * window.devicePixelRatio;
      simCanvas.height = simH * window.devicePixelRatio;
      simCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
      simCanvas.style.width = `${simW}px`;
      simCanvas.style.height = `${simH}px`;

      auToPx = (simW - originX - 60) / 3.0; 

      const rectG = graphCanvas.getBoundingClientRect();
      graphW = rectG.width;
      graphH = 200;
      graphCanvas.width = graphW * window.devicePixelRatio;
      graphCanvas.height = graphH * window.devicePixelRatio;
      graphCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
      
      updatePhysics();
    }

    function formatSci(num) {
      if (num === 0) return "0";
      let exp = Math.floor(Math.log10(num));
      let mantissa = num / Math.pow(10, exp);
      return `${mantissa.toFixed(2)}e${exp}`;
    }

    function updatePhysics() {
      const P_watts = state.P_slider * P_MULTIPLIER;
      const x_meters = state.x_au * AU_IN_METERS;
      const surfaceArea = 4 * Math.PI * Math.pow(x_meters, 2);
      state.currentIntensity = P_watts / surfaceArea;
      const relAmplitude = 1 / state.x_au;

      els.pVal.innerHTML = `${state.P_slider.toFixed(1)} &times; 10<sup style="font-size:0.8em">26</sup> W`;
      els.xVal.innerHTML = `${state.x_au.toFixed(2)} AU`;
      els.iResult.innerHTML = state.currentIntensity > 10000 ? formatSci(state.currentIntensity) : Math.round(state.currentIntensity).toLocaleString();

      els.eqTelemetry.innerHTML = `
        DISTANCE: <span class="success">${state.x_au.toFixed(2)} AU</span> | 
        INTENSITY: <span class="highlight">${Math.round(state.currentIntensity).toLocaleString()} W/m&sup2;</span>
      `;

      drawGraph(state.currentIntensity);
    }

    function drawGraph(currentI) {
      graphCtx.clearRect(0, 0, graphW, graphH);
      const padX = 45;
      const padY = 20;
      const plotW = graphW - padX - 20;
      const plotH = graphH - padY - 30;

      graphCtx.strokeStyle = "#475569";
      graphCtx.beginPath();
      graphCtx.moveTo(padX, padY);
      graphCtx.lineTo(padX, padY + plotH);
      graphCtx.lineTo(padX + plotW, padY + plotH);
      graphCtx.stroke();

      graphCtx.beginPath();
      graphCtx.strokeStyle = "#fbbf24";
      graphCtx.lineWidth = 3;
      const maxI_plot = (state.P_slider * P_MULTIPLIER) / (4 * Math.PI * Math.pow(0.2 * AU_IN_METERS, 2));
      for (let px = 0; px <= plotW; px += 2) {
        let au = 0.2 + (px / plotW) * 2.8;
        let I = (state.P_slider * P_MULTIPLIER) / (4 * Math.PI * Math.pow(au * AU_IN_METERS, 2));
        let py = plotH - (I / maxI_plot) * plotH;
        if (px === 0) graphCtx.moveTo(padX + px, padY + py);
        else graphCtx.lineTo(padX + px, padY + py);
      }
      graphCtx.stroke();

      let currentPx = ((state.x_au - 0.2) / 2.8) * plotW;
      let currentPy = plotH - (currentI / maxI_plot) * plotH;
      graphCtx.beginPath();
      graphCtx.arc(padX + currentPx, padY + currentPy, 5, 0, Math.PI*2);
      graphCtx.fillStyle = "#38bdf8";
      graphCtx.fill();
    }

    function drawSim() {
      simCtx.clearRect(0, 0, simW, simH);
      const centerY = simH / 2 + 20;

      // Glow
      const grad = simCtx.createRadialGradient(originX, centerY, 0, originX, centerY, simW * 0.8);
      grad.addColorStop(0, "rgba(251, 191, 36, 0.4)");
      grad.addColorStop(0.4, "rgba(251, 191, 36, 0.05)");
      grad.addColorStop(1, "rgba(251, 191, 36, 0)");
      simCtx.fillStyle = grad;
      simCtx.fillRect(0, 0, simW, simH);

      // Wave
      simCtx.beginPath();
      simCtx.strokeStyle = "rgba(167, 139, 250, 0.4)";
      simCtx.lineWidth = 2;
      for (let px = originX + 20; px < simW; px++) {
        let au = (px - originX) / auToPx;
        let visualAmp = Math.min(80, 25 * (1/au)); 
        let y = centerY + Math.sin((px / 15) - state.phase) * visualAmp;
        if (px === originX + 20) simCtx.moveTo(px, y);
        else simCtx.lineTo(px, y);
      }
      simCtx.stroke();

      // Sun
      simCtx.beginPath();
      simCtx.arc(originX, centerY, 25, 0, Math.PI*2);
      simCtx.fillStyle = "#fbbf24";
      simCtx.fill();

      // Planet & Dynamic Labels
      const earthPx = originX + (state.x_au * auToPx);
      
      // Floating Intensity Label (Above Planet)
      simCtx.fillStyle = "#fbbf24";
      simCtx.font = "bold 14px Arial";
      simCtx.textAlign = "center";
      simCtx.fillText(`${Math.round(state.currentIntensity).toLocaleString()} W/m²`, earthPx, centerY - 55);
      
      // Distance Label
      simCtx.fillStyle = "#38bdf8";
      simCtx.font = "12px Arial";
      simCtx.fillText(`${state.x_au.toFixed(2)} AU`, earthPx, centerY - 35);

      // Planet
      simCtx.beginPath();
      simCtx.arc(earthPx, centerY, 14, 0, Math.PI*2);
      simCtx.fillStyle = "#38bdf8";
      simCtx.fill();
      simCtx.beginPath();
      simCtx.arc(earthPx, centerY, 14, -Math.PI/2, Math.PI/2);
      simCtx.fillStyle = "rgba(0,0,0,0.4)";
      simCtx.fill();

      if (state.dragging) {
        simCtx.beginPath();
        simCtx.arc(earthPx, centerY, 22, 0, Math.PI*2);
        simCtx.strokeStyle = "rgba(255,255,255,0.5)";
        simCtx.stroke();
      }

      state.phase += 0.04;
      requestAnimationFrame(drawSim);
    }

    function getMouseX(e) {
      const rect = simCanvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      return clientX - rect.left;
    }

    function handleStart(e) {
      const pxX = getMouseX(e);
      const earthPx = originX + (state.x_au * auToPx);
      if (Math.abs(pxX - earthPx) < 40) {
        state.dragging = true;
        // Only prevent default if we are actually dragging the planet
        if (e.cancelable) e.preventDefault(); 
      }
    }

    function handleMove(e) {
      if (!state.dragging) return;
      if (e.cancelable) e.preventDefault(); // Stop scrolling ONLY while dragging

      const pxX = getMouseX(e);
      let newAu = (pxX - originX) / auToPx;
      state.x_au = Math.max(0.2, Math.min(3.0, newAu));
      els.xSlider.value = state.x_au;
      updatePhysics();
    }

    function handleEnd() { state.dragging = false; }

    // Desktop
    simCanvas.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

    // iPad / Mobile - Passive: true allows the browser to scroll the page normally
    simCanvas.addEventListener('touchstart', handleStart, { passive: false });
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('touchend', handleEnd);

    els.pSlider.addEventListener('input', (e) => { state.P_slider = parseFloat(e.target.value); updatePhysics(); });
    els.xSlider.addEventListener('input', (e) => { state.x_au = parseFloat(e.target.value); updatePhysics(); });

    window.addEventListener('resize', resize);
    setTimeout(resize, 100);
    requestAnimationFrame(drawSim);
  </script>
</body>
</html>
