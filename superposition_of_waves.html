<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Superposition of Wave Pulses</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 15px;
      touch-action: none;
    }

    .container {
      width: 100%;
      max-width: 1300px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 950px) {
      .container {
        grid-template-columns: 1.4fr 1fr;
        align-items: start;
      }
    }

    .panel {
      background: #1e293b;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .title {
      margin: 0 0 15px;
      font-size: 1.3rem;
      font-weight: 700;
      color: #f8fafc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Canvas Area */
    .canvas-wrap {
      width: 100%;
      background: #020617;
      border-radius: 12px;
      border: 1px solid #334155;
      overflow: hidden;
      position: relative;
    }
    
    #simCanvas {
      display: block;
      width: 100%;
      height: 450px;
    }

    /* Controls */
    .controls-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .wave-section {
      background: #0f172a;
      border-radius: 10px;
      border: 1px solid #334155;
      padding: 15px;
      margin-bottom: 10px;
    }

    .wave-title {
      font-size: 1.05rem;
      font-weight: bold;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e293b;
    }

    .control-group { margin-bottom: 15px; }
    .control-group:last-child { margin-bottom: 0; }

    .control-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    /* Step Buttons (+/-) */
    .val-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    button.step-btn {
      flex: none;
      width: 26px;
      height: 26px;
      min-height: 0;
      padding: 0;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      cursor: pointer;
      transition: background 0.1s;
    }
    button.step-btn:hover { background: rgba(255, 255, 255, 0.25); }
    button.step-btn:active { transform: scale(0.9); }

    .val-text {
      min-width: 55px;
      text-align: center;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
    }

    input[type="range"] {
      width: 100%;
      min-height: 30px;
      cursor: pointer;
    }

    /* Math Panel */
    .math-panel {
      background: #020617;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
    }

    .math-block {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }
    .math-block:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

    .math-title {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
    }

    .equation {
      font-family: "Courier New", Courier, monospace;
      font-size: 1.1rem;
      font-weight: bold;
      line-height: 1.5;
      color: #e2e8f0;
    }

    .subtext { font-size: 0.8em; color: #64748b; }
    .w1-color { color: #38bdf8; }
    .w2-color { color: #ef4444; }
    .res-color { color: #fbbf24; }
    
    .status-badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

  </style>
</head>
<body>

  <div class="container">
    
    <section class="panel" style="display: flex; flex-direction: column;">
      <div class="title">
        <span>Colliding Wave Pulses (Manual)</span>
      </div>
      
      <div class="canvas-wrap" style="flex-grow: 1;">
        <canvas id="simCanvas"></canvas>
      </div>
      
      <div class="math-panel">
        <div class="math-block" style="border-left: 4px solid #38bdf8; padding-left: 10px;">
          <div class="math-title w1-color">Pulse 1</div>
          <div class="equation" id="eqW1">y<sub>1</sub> = 3.00 e<sup class="subtext">-(x - 10.00)&sup2; / w&sup2;</sup></div>
        </div>
        <div class="math-block" style="border-left: 4px solid #ef4444; padding-left: 10px;">
          <div class="math-title w2-color">Pulse 2</div>
          <div class="equation" id="eqW2">y<sub>2</sub> = 3.00 e<sup class="subtext">-(x - 30.00)&sup2; / w&sup2;</sup></div>
        </div>
        <div class="math-block" style="border-left: 4px solid #fbbf24; padding-left: 10px;">
          <div class="math-title res-color">
            <span>Resultant Superposition</span>
            <span id="statusBadge" class="status-badge" style="background: #334155; color: #cbd5e1;">INDEPENDENT</span>
          </div>
          <div class="equation">y<sub style="font-size:0.7em">res</sub>(x) = <span class="w1-color">y<sub>1</sub></span> + <span class="w2-color">y<sub>2</sub></span></div>
        </div>
      </div>
    </section>

    <section class="panel">

      <div class="wave-section" style="border-top: 4px solid #38bdf8;">
        <div class="wave-title w1-color">Pulse 1 (Blue)</div>
        
        <div class="control-group">
          <label>
            <span>Position (x<sub>1</sub>)</span>
            <div class="val-container">
              <button class="step-btn" onclick="step('x1', -0.5)">-</button>
              <span id="valX1" class="val-text w1-color">10.0 m</span>
              <button class="step-btn" onclick="step('x1', 0.5)">+</button>
            </div>
          </label>
          <input type="range" id="slX1" min="0" max="40" step="0.1" value="10.0">
        </div>

        <div class="control-group">
          <label>
            <span>Amplitude (A<sub>1</sub>)</span>
            <div class="val-container">
              <button class="step-btn" onclick="step('a1', -0.1)">-</button>
              <span id="valA1" class="val-text w1-color">3.0</span>
              <button class="step-btn" onclick="step('a1', 0.1)">+</button>
            </div>
          </label>
          <input type="range" id="slA1" min="-5" max="5" step="0.1" value="3.0">
        </div>

        <div class="control-group">
          <label>
            <span>Width (w<sub>1</sub>)</span>
            <div class="val-container">
              <button class="step-btn" onclick="step('w1', -0.1)">-</button>
              <span id="valW1" class="val-text w1-color">1.5</span>
              <button class="step-btn" onclick="step('w1', 0.1)">+</button>
            </div>
          </label>
          <input type="range" id="slW1" min="0.5" max="3" step="0.1" value="1.5">
        </div>
      </div>

      <div class="wave-section" style="border-top: 4px solid #ef4444;">
        <div class="wave-title w2-color">Pulse 2 (Red)</div>
        
        <div class="control-group">
          <label>
            <span>Position (x<sub>2</sub>)</span>
            <div class="val-container">
              <button class="step-btn" onclick="step('x2', -0.5)">-</button>
              <span id="valX2" class="val-text w2-color">30.0 m</span>
              <button class="step-btn" onclick="step('x2', 0.5)">+</button>
            </div>
          </label>
          <input type="range" id="slX2" min="0" max="40" step="0.1" value="30.0">
        </div>

        <div class="control-group">
          <label>
            <span>Amplitude (A<sub>2</sub>)</span>
            <div class="val-container">
              <button class="step-btn" onclick="step('a2', -0.1)">-</button>
              <span id="valA2" class="val-text w2-color">3.0</span>
              <button class="step-btn" onclick="step('a2', 0.1)">+</button>
            </div>
          </label>
          <input type="range" id="slA2" min="-5" max="5" step="0.1" value="3.0">
        </div>

        <div class="control-group">
          <label>
            <span>Width (w<sub>2</sub>)</span>
            <div class="val-container">
              <button class="step-btn" onclick="step('w2', -0.1)">-</button>
              <span id="valW2" class="val-text w2-color">1.5</span>
              <button class="step-btn" onclick="step('w2', 0.1)">+</button>
            </div>
          </label>
          <input type="range" id="slW2" min="0.5" max="3" step="0.1" value="1.5">
        </div>
      </div>

    </section>
  </div>

  <script>
    // --- STATE ---
    const state = {
      // Pulse 1 (Blue)
      a1: 3.0, x1: 10.0, w1: 1.5,
      
      // Pulse 2 (Red)
      a2: 3.0, x2: 30.0, w2: 1.5
    };

    // --- DOM ---
    const els = {
      slA1: document.getElementById('slA1'), slX1: document.getElementById('slX1'), slW1: document.getElementById('slW1'),
      slA2: document.getElementById('slA2'), slX2: document.getElementById('slX2'), slW2: document.getElementById('slW2'),
      valA1: document.getElementById('valA1'), valX1: document.getElementById('valX1'), valW1: document.getElementById('valW1'),
      valA2: document.getElementById('valA2'), valX2: document.getElementById('valX2'), valW2: document.getElementById('valW2'),
      
      eqW1: document.getElementById('eqW1'),
      eqW2: document.getElementById('eqW2'),
      statusBadge: document.getElementById('statusBadge')
    };

    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    // --- SIZING ---
    let pxPerMeter = 20; 
    let originY = 225;   
    const totalMeters = 40; // Total X distance to fit on screen

    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = 450 * dpr;
      ctx.scale(dpr, dpr);
      canvas.style.width = `${rect.width}px`;
      canvas.style.height = `450px`;
      
      originY = 450 / 2;
      pxPerMeter = rect.width / totalMeters; 
      
      draw();
    }
    window.addEventListener('resize', resizeCanvas);

    // --- MATH & UI SYNC ---
    function updateMath() {
      // Update Slider DOM
      els.slA1.value = state.a1; els.slX1.value = state.x1; els.slW1.value = state.w1;
      els.slA2.value = state.a2; els.slX2.value = state.x2; els.slW2.value = state.w2;

      // Update Text Labels
      els.valA1.textContent = state.a1.toFixed(1);
      els.valX1.textContent = `${state.x1.toFixed(1)} m`;
      els.valW1.textContent = state.w1.toFixed(1);
      els.valA2.textContent = state.a2.toFixed(1);
      els.valX2.textContent = `${state.x2.toFixed(1)} m`;
      els.valW2.textContent = state.w2.toFixed(1);

      // Format equations properly with proper subscripts
      els.eqW1.innerHTML = `y<sub>1</sub> = ${state.a1.toFixed(1)} e<sup class="subtext">-(x - ${state.x1.toFixed(1)})&sup2; / ${state.w1.toFixed(1)}&sup2;</sup>`;
      els.eqW2.innerHTML = `y<sub>2</sub> = ${state.a2.toFixed(1)} e<sup class="subtext">-(x - ${state.x2.toFixed(1)})&sup2; / ${state.w2.toFixed(1)}&sup2;</sup>`;
      
      // Check for Interference (Overlap)
      const distance = Math.abs(state.x1 - state.x2);
      const collisionThreshold = (state.w1 + state.w2) * 1.5; // Visual overlap threshold

      if (distance < collisionThreshold) {
        // They are overlapping! Check signs of amplitude
        if ((state.a1 > 0 && state.a2 > 0) || (state.a1 < 0 && state.a2 < 0)) {
          els.statusBadge.textContent = "CONSTRUCTIVE";
          els.statusBadge.style.background = "#10b981"; // Green
          els.statusBadge.style.color = "#ecfdf5";
        } else if (state.a1 !== 0 && state.a2 !== 0) {
          els.statusBadge.textContent = "DESTRUCTIVE";
          els.statusBadge.style.background = "#ef4444"; // Red
          els.statusBadge.style.color = "#fef2f2";
        }
      } else {
        els.statusBadge.textContent = "INDEPENDENT";
        els.statusBadge.style.background = "#334155"; // Gray
        els.statusBadge.style.color = "#cbd5e1";
      }

      // Draw immediately on update
      draw();
    }

    // Handle +/- buttons
    window.step = function(param, amount) {
      state[param] = Math.round((state[param] + amount) * 10) / 10;
      
      // Clamping limits
      if (param === 'a1' || param === 'a2') state[param] = Math.max(-5, Math.min(5, state[param]));
      if (param === 'x1' || param === 'x2') state[param] = Math.max(0, Math.min(40, state[param]));
      if (param === 'w1' || param === 'w2') state[param] = Math.max(0.5, Math.min(3, state[param]));
      
      updateMath();
    };

    // Slider Event Listeners
    ['A1', 'X1', 'W1', 'A2', 'X2', 'W2'].forEach(param => {
      els[`sl${param}`].addEventListener('input', (e) => {
        state[param.toLowerCase()] = parseFloat(e.target.value);
        updateMath();
      });
    });

    // --- DRAWING LOGIC ---
    function draw() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);

      // Draw Grid & X-Axis
      ctx.lineWidth = 1;
      ctx.strokeStyle = "#1e293b";
      for (let i = 0; i <= w; i += pxPerMeter) { // 1m vertical grid lines
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
      }
      for (let i = originY; i <= h; i += pxPerMeter*2) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }
      for (let i = originY; i >= 0; i -= pxPerMeter*2) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }

      ctx.strokeStyle = "#475569";
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, originY); ctx.lineTo(w, originY); ctx.stroke(); // X-Axis

      // Scale amplitude for display (20 pixels per amplitude unit)
      const ampScale = 20; 

      // Function to get Y physics value using Gaussian Pulse: y = A * e^(-(x-x0)^2 / w^2)
      const getY1 = (x) => state.a1 * Math.exp(-Math.pow(x - state.x1, 2) / Math.pow(state.w1, 2));
      const getY2 = (x) => state.a2 * Math.exp(-Math.pow(x - state.x2, 2) / Math.pow(state.w2, 2));

      // Draw Pulse 1 (Blue)
      ctx.beginPath();
      ctx.strokeStyle = "rgba(56, 189, 248, 0.6)"; // #38bdf8 translucent
      ctx.lineWidth = 2;
      for (let px = 0; px <= w; px+=2) {
        let x = px / pxPerMeter;
        let y = originY - (getY1(x) * ampScale);
        if (px === 0) ctx.moveTo(px, y); else ctx.lineTo(px, y);
      }
      ctx.stroke();

      // Draw Pulse 2 (Red)
      ctx.beginPath();
      ctx.strokeStyle = "rgba(239, 68, 68, 0.6)"; // #ef4444 translucent
      ctx.lineWidth = 2;
      for (let px = 0; px <= w; px+=2) {
        let x = px / pxPerMeter;
        let y = originY - (getY2(x) * ampScale);
        if (px === 0) ctx.moveTo(px, y); else ctx.lineTo(px, y);
      }
      ctx.stroke();

      // Draw Resultant Wave (Yellow/Amber)
      ctx.beginPath();
      ctx.strokeStyle = "#fbbf24"; 
      ctx.lineWidth = 4;
      ctx.lineJoin = "round";
      ctx.shadowColor = "rgba(251, 191, 36, 0.5)";
      ctx.shadowBlur = 10;
      
      for (let px = 0; px <= w; px+=2) {
        let x = px / pxPerMeter;
        let yRes = getY1(x) + getY2(x);
        let py = originY - (yRes * ampScale);
        if (px === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.shadowBlur = 0; // Reset shadow
    }

    // --- INIT ---
    setTimeout(() => {
      resizeCanvas();
      updateMath();
    }, 50);

  </script>
</body>
</html>
